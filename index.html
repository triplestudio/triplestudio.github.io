<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #24292f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.dark {
            background: #0d1117;
            color: #c9d1d9;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .theme-toggle {
            background: none;
            border: 2px solid #d0d7de;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        body.dark .theme-toggle {
            border-color: #30363d;
        }

        .theme-toggle:hover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            padding: 1.25rem 1.5rem;
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            text-decoration: none;
            color: #24292f;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        body.dark .link-card {
            background: #161b22;
            border-color: #30363d;
            color: #c9d1d9;
        }

        .link-card:hover {
            transform: translateX(4px);
            border-color: #58a6ff;
            background: #f0f6fc;
        }

        body.dark .link-card:hover {
            background: #1c2128;
        }

        .link-icon {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
            margin-top: 2px;
        }

        .link-content {
            flex: 1;
        }

        .link-title {
            font-weight: 500;
            margin-bottom: 0.25rem;
        }

        .link-desc {
            font-size: 0.85rem;
            color: #57606a;
            line-height: 1.4;
        }

        body.dark .link-desc {
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">快捷链接</h1>
            <button class="theme-toggle" id="themeToggle">
                <span>🌙</span>
            </button>
        </div>

        <div class="links-grid">
            <a href="vuepress2-math/" class="link-card">
                <span class="link-icon">📝</span>
                <div class="link-content">
                    <div class="link-title">VuePress2 Math 示例</div>
                    <div class="link-desc">VuePress2 渲染数学公式站点示例</div>
                </div>
            </a>
            <a href="geogebra_script_exec.html" class="link-card">
                <span class="link-icon">📝</span>
                <div class="link-content">
                    <div class="link-title">GeoGebra Script Exec</div>
                    <div class="link-desc">GeoGebra 通过脚本进行几何图形绘制</div>
                </div>
            </a>
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Check for saved theme preference or default to light
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            body.classList.add('dark');
            themeToggle.innerHTML = '<span>☀️</span>';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');

            if (body.classList.contains('dark')) {
                themeToggle.innerHTML = '<span>☀️</span>';
                localStorage.setItem('theme', 'dark');
            } else {
                themeToggle.innerHTML = '<span>🌙</span>';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
